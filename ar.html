<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MenuVista • AR Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{margin:0;background:#0b0b10;color:#fff;font-family:system-ui}
    model-viewer{width:100vw;height:100vh;background:#0b0b10}
    .topbar{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;z-index:5}
    .chip{padding:10px 12px;border-radius:14px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);font-weight:900}
    .panel{
      position:absolute;left:14px;right:14px;bottom:14px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.1);
      border-radius:18px;padding:14px;
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;
    }
    .price{color:#FF7A2F;font-weight:900}
    button{border:0;border-radius:12px;padding:10px 12px;font-weight:900;cursor:pointer}
    .primary{background:#FF7A2F;color:#111}
    .ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.14)}
  </style>
</head>

<body>

<div class="topbar">
  <div class="chip" onclick="location.href='index.html'" style="cursor:pointer">← Menu</div>
  <div class="chip" id="status">Loading…</div>
</div>

<model-viewer id="mv"
  camera-controls
  auto-rotate
  shadow-intensity="1"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-placement="floor">
</model-viewer>

<div class="panel">
  <div>
    <div id="name" style="font-weight:900"></div>
    <div><span class="price" id="price"></span></div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="ghost" id="prev">◀</button>
    <button class="ghost" id="next">▶</button>
    <button class="primary" id="arBtn">View in AR</button>
  </div>
</div>

<script>
let dishes = [];
let index = 0;

async function loadDishes(){
  const res = await fetch("data/dishes.json", {cache:"no-store"});
  return await res.json();
}

function getDishId(){
  const p = new URLSearchParams(location.search);
  return p.get("dish");
}

function updateURL(){
  const u = new URL(location.href);
  u.searchParams.set("dish", dishes[index].id);
  history.replaceState({}, "", u);
}

function showDish(){
  const d = dishes[index];
  document.getElementById("mv").src = d.model;
  document.getElementById("name").textContent = d.name;
  document.getElementById("price").textContent = "KSh " + d.price.toLocaleString("en-KE");
  updateURL();
}

document.getElementById("prev").onclick = ()=>{
  index = (index-1+dishes.length)%dishes.length;
  showDish();
};
document.getElementById("next").onclick = ()=>{
  index = (index+1)%dishes.length;
  showDish();
};
document.getElementById("arBtn").onclick = async ()=>{
  try{ await document.getElementById("mv").activateAR(); }
  catch(e){ alert("AR not supported on this phone."); }
};

(async function(){
  dishes = await loadDishes();

  const id = getDishId();
  index = dishes.findIndex(d=>d.id===id);
  if(index<0) index=0;

  showDish();
  document.getElementById("status").textContent="Ready";
})();
</script>

</body>
</html>
