<!-- STK Push (Render backend) -->
<div class="box">
  <div style="font-weight:900;margin-bottom:6px">Pay via STK Push (Online)</div>
  <div class="small">Enter phone then tap STK Push. If backend is not deployed, use manual payment below.</div>

  <div class="row2" style="margin-top:10px">
    <div>
      <div class="small" style="margin-bottom:6px">Phone (07XXXXXXXX)</div>
      <input id="stkPhone" placeholder="0745XXXXXX" inputmode="numeric" />
    </div>
    <div>
      <div class="small" style="margin-bottom:6px">Backend</div>
      <div class="code" id="stkBackend">https://menuvista-mpesa-backend.onrender.com</div>
    </div>
  </div>

  <div class="ctaRow">
    <button class="primary" id="btnSTK" style="flex:1">Pay via STK Push</button>
    <button class="ghost" id="btnHealth" style="flex:1">Check Backend</button>
  </div>

  <div class="small" id="stkStatus" style="margin-top:10px;opacity:.8">Status: idle</div>
</div>
