<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MenuVista • Restaurant Menu</title>

<style>
:root { color-scheme: dark; }
body{
  margin:0;
  font-family:system-ui, Arial, sans-serif;
  background:#0b0b10;
  color:#fff;
}

.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:18px;
}

.brand{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.logo{font-weight:900;font-size:18px;}
.sub{opacity:.8;font-size:13px;margin-top:4px;}

.pill{
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  font-weight:900;
  font-size:12px;
  cursor:pointer;
  text-decoration:none;
  color:#fff;
}

.search{margin:14px 0;}
input{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.06);
  color:#fff;
  outline:none;
  font-weight:700;
}

h2{margin:18px 0 10px;font-size:16px;}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}

@media (min-width:860px){
  .grid{grid-template-columns:repeat(3,minmax(0,1fr));}
}

.card{
  border:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.35);
  border-radius:18px;
  overflow:hidden;
  transition:transform .12s ease;
}

.card:hover{transform:translateY(-2px);}

.thumb{
  height:150px;
  background-size:cover;
  background-position:center;
  background-color:rgba(255,255,255,.03);
}

.body{padding:12px;}

.name{font-weight:900;margin:0 0 4px;}
.desc{margin:0;opacity:.85;font-size:12.5px;}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:10px;
  gap:10px;
}

.price{font-weight:900;color:#FF7A2F;}

.btn{
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  font-weight:900;
  font-size:12px;
  cursor:pointer;
}

.cartBtn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 10px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  font-weight:900;
  font-size:12px;
  cursor:pointer;
}

.badge{
  min-width:22px;
  height:22px;
  border-radius:999px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#FF7A2F;
  color:#111;
  font-weight:900;
  font-size:12px;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  z-index:50;
}

.overlay.show{display:block;}

.drawer{
  position:fixed;
  top:0;
  right:0;
  height:100%;
  width:min(420px,92vw);
  background:#111;
  border-left:1px solid rgba(255,255,255,.12);
  transform:translateX(100%);
  transition:.2s ease;
  z-index:60;
  display:flex;
  flex-direction:column;
}

.drawer.show{transform:translateX(0);}

.drawerHeader{
  padding:14px;
  display:flex;
  justify-content:space-between;
  font-weight:900;
}

.cartList{
  flex:1;
  padding:0 14px 14px;
  overflow:auto;
}

.item{
  border:1px solid rgba(255,255,255,.12);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
}

.drawerFooter{
  border-top:1px solid rgba(255,255,255,.12);
  padding:14px;
}

.totalAmt{font-weight:900;color:#FF7A2F;}

.primary{
  background:#FF7A2F;
  color:#111;
  border:none;
  border-radius:14px;
  padding:10px;
  font-weight:900;
  cursor:pointer;
  width:100%;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="brand">
    <div>
      <div class="logo">MenuVista • Demo Restaurant</div>
      <div class="sub">Preview food in AR, add to cart, checkout via WhatsApp + M-Pesa.</div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;">
      <a class="pill" href="dashboard.html">Dashboard</a>
      <div class="cartBtn" id="openCartBtn">
        Cart <span class="badge" id="cartCount">0</span>
      </div>
    </div>
  </div>

  <div class="search">
    <input id="q" placeholder="Search dishes..." />
  </div>

  <div id="menu"></div>
</div>

<div class="overlay" id="overlay"></div>

<div class="drawer" id="drawer">
  <div class="drawerHeader">
    <div>Your Cart</div>
    <div id="closeCartBtn" style="cursor:pointer;">✕</div>
  </div>

  <div class="cartList" id="cartList"></div>

  <div class="drawerFooter">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
      <div>Total</div>
      <div class="totalAmt" id="cartTotal">KSh 0</div>
    </div>
    <button class="primary" id="checkoutBtn">Checkout</button>
  </div>
</div>

<script>
const DISHES_URL="data/dishes.json";
const CART_KEY="mv_cart_v1";

let dishes=[];

async function loadDishes(){
  const res=await fetch(DISHES_URL,{cache:"no-store"});
  return await res.json();
}

function loadCart(){
  try{return JSON.parse(localStorage.getItem(CART_KEY)||"{}");}
  catch{return {};}
}

function saveCart(cart){
  localStorage.setItem(CART_KEY,JSON.stringify(cart));
  updateCartUI();
}

function formatKsh(n){
  return "KSh "+Number(n).toLocaleString("en-KE");
}

function addToCart(id){
  const cart=loadCart();
  cart[id]=(cart[id]||0)+1;
  saveCart(cart);
  openCart();
}

function updateCartUI(){
  const cart=loadCart();
  const count=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById("cartCount").textContent=count;

  const total=Object.entries(cart).reduce((sum,[id,qty])=>{
    const d=dishes.find(x=>x.id===id);
    return sum+(d?d.price*qty:0);
  },0);

  document.getElementById("cartTotal").textContent=formatKsh(total);

  const list=document.getElementById("cartList");
  list.innerHTML="";
  for(const [id,qty] of Object.entries(cart)){
    const d=dishes.find(x=>x.id===id);
    if(!d)continue;
    list.innerHTML+=`
      <div class="item">
        <div><b>${d.name}</b></div>
        <div>${qty} × ${formatKsh(d.price)}</div>
      </div>
    `;
  }
}

function renderMenu(){
  const term=document.getElementById("q").value.toLowerCase();
  const menu=document.getElementById("menu");
  menu.innerHTML="";

  const cats=[...new Set(dishes.map(d=>d.cat||"Other"))];

  cats.forEach(cat=>{
    const section=document.createElement("div");
    section.innerHTML=`<h2>${cat}</h2><div class="grid"></div>`;
    const grid=section.querySelector(".grid");

    dishes
      .filter(d=>(d.cat||"Other")===cat)
      .filter(d=>!term||d.name.toLowerCase().includes(term))
      .forEach(d=>{
        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
          <div class="thumb" style="background-image:url('${d.thumb}')"></div>
          <div class="body">
            <p class="name">${d.name}</p>
            <p class="desc">${d.desc||""}</p>
            <div class="row">
              <div class="price">${formatKsh(d.price)}</div>
              <div style="display:flex;gap:6px;">
                <div class="btn" onclick="location.href='ar.html?dish=${d.id}'">AR</div>
                <div class="btn" onclick="addToCart('${d.id}')">Add</div>
              </div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

    menu.appendChild(section);
  });
}

function openCart(){
  document.getElementById("overlay").classList.add("show");
  document.getElementById("drawer").classList.add("show");
}

function closeCart(){
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("drawer").classList.remove("show");
}

document.getElementById("openCartBtn").onclick=openCart;
document.getElementById("closeCartBtn").onclick=closeCart;
document.getElementById("overlay").onclick=closeCart;

document.getElementById("checkoutBtn").onclick=()=>{
  const cart=loadCart();
  if(!Object.keys(cart).length){alert("Cart is empty.");return;}
  const payload=encodeURIComponent(btoa(JSON.stringify(cart)));
  location.href=`ar.html?checkout=1&cart=${payload}`;
};

document.getElementById("q").addEventListener("input",renderMenu);

(async function(){
  dishes=await loadDishes();
  renderMenu();
  updateCartUI();
})();
</script>
</body>
</html>
